services:
  - type: web
    name: resume-analyzer-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./phase6_analyses.db
      - key: PYTHON_VERSION
        value: 3.13
