<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phase 6 AI Resume Analyzer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <section>
        <p class="eyebrow">Phase 6</p>
        <h1>AI Interview Coach Resume Analyzer</h1>
        <p id="status">Checking API...</p>
        <p class="notice" role="note">
          Bring your own key (BYOK): you can use Gemini or OpenAI.
          OpenAI API keys require billing to be enabled or a paid tier.
        </p>
        <div class="hero-actions">
          <button type="button" class="secondary" data-href="settings.html">Add API key here</button>
        </div>
      </section>
      <form id="form">
        <label>Resume file <input name="resume" type="file" accept=".txt,.pdf" required /></label>
        <label>Job description <textarea name="job_description" rows="10" required></textarea></label>
        <button>Analyze With AI</button>
      </form>
      <section id="result"></section>
      <section>
        <h2>Analysis History</h2>
        <div id="history"></div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
